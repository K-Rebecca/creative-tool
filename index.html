function lsGet(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch{return f;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.warn("lsSet overflow",k,e);}}
function lsDel(k){try{localStorage.removeItem(k);}catch{}}

// ─── 知识库 localStorage 持久化 ───────────────────────────────────────────────
// 文字条目直接存 LS；图片/视频帧体积大，也存 LS，超限时给出提示而不是崩溃
function saveKBItem(item){
  try{lsSet(`mst_kb_item_${item.id}`,item);}
  catch(e){
    // 可能超 quota，删掉 base64 数据只保留 meta，防止崩溃
    const light={...item};
    if(light.data) light.data="[超出存储限制，已清除]";
    if(light.preview) light.preview="";
    if(light.frames) light.frames=light.frames.map(f=>({...f,b64:"",preview:""}));
    try{lsSet(`mst_kb_item_${item.id}`,light);}catch{}
    return false;
  }
  return true;
}
function loadKBFromLS(){
  const order=lsGet(LS_KB_ORDER,[]);
  const counter=lsGet(LS_KB_CTR,1);
  const items=[];
  for(const{id,disabled}of order){
    const item=lsGet(`mst_kb_item_${id}`,null);
    if(item)items.push({...item,disabled:!!disabled});
  }
  return{items,counter};
}
function saveKBOrder(arr){lsSet(LS_KB_ORDER,arr.map(i=>({id:i.id,disabled:!!i.disabled})));}

function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=()=>rej(new Error("读取失败"));r.readAsDataURL(file);});}

// ─── 视频抽帧 ─────────────────────────────────────────────────────────────────
function extractVideoFrames(file,frameCount=6){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const video=document.createElement("video");
    video.muted=true;video.playsInline=true;video.preload="metadata";video.src=url;
    video.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("视频加载失败"));};
    video.onloadedmetadata=()=>{
      const dur=video.duration;
      if(!dur||!isFinite(dur)){URL.revokeObjectURL(url);reject(new Error("无法读取视频时长"));return;}
      const canvas=document.createElement("canvas");
      const scale=Math.min(1,640/video.videoWidth);
      canvas.width=Math.round(video.videoWidth*scale);
      canvas.height=Math.round(video.videoHeight*scale);
      const ctx=canvas.getContext("2d");
      const frames=[];
      const times=Array.from({length:frameCount},(_,i)=>dur*(i+0.5)/frameCount);
      let idx=0;
      const seek=()=>{if(idx>=times.length){URL.revokeObjectURL(url);resolve(frames);return;}video.currentTime=times[idx];};
      video.onseeked=()=>{
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const dataURL=canvas.toDataURL("image/jpeg",0.65);
        const b64=dataURL.split(",")[1];
        const ts=times[idx];
        const label=`${Math.floor(ts/60).toString().padStart(2,"0")}:${Math.floor(ts%60).toString().padStart(2,"0")}`;
        frames.push({b64,preview:dataURL,label});
        idx++;seek();
      };
      seek();
    };
    video.load();
  });
}

// ─── callAI ───────────────────────────────────────────────────────────────────
function buildKBContext(kb){
  if(!kb||!kb.length)return{sysAppend:"",imageBlocks:[]};
  const textItems=kb.filter(i=>i.type==="text"||i.type==="script");
  const imgItems=kb.filter(i=>i.type==="image");
  const vidItems=kb.filter(i=>i.type==="video");
  let sysAppend="";
  if(textItems.length){
    sysAppend+="\n\n【知识库 - 文字参考，请充分学习后再生成】\n";
    textItems.forEach((it,i)=>{ sysAppend+=`\n--- 参考${i+1}「${it.name}」---\n${it.content}\n`; });
    sysAppend+="\n【文字参考结束，风格与策略请与以上内容对齐】\n";
  }
  const imageBlocks=[];
  imgItems.forEach(it=>{if(it.data&&!it.data.startsWith("["))imageBlocks.push({b64:it.data,mediaType:it.mediaType,label:`图片「${it.name}」`});});
  vidItems.forEach(it=>{(it.frames||[]).forEach((f,fi)=>{if(f.b64)imageBlocks.push({b64:f.b64,mediaType:"image/jpeg",label:`视频「${it.name}」帧${fi+1}(${f.label})`});});});
  return{sysAppend,imageBlocks};
}

async function callAI(sys,user,kb=[],aiCfg=DEFAULT_AI_CFG){
  const{sysAppend,imageBlocks}=buildKBContext(kb);
  const fullSys=sys+sysAppend;
  const prov=PROVIDERS[aiCfg.providerId]||PROVIDERS.anthropic;
  const baseURL=aiCfg.providerId==="custom"?aiCfg.customBaseURL:prov.baseURL;
  const model=aiCfg.providerId==="custom"?aiCfg.customModel:(aiCfg.model||prov.defaultModel);
  if(!baseURL)throw new Error("请先在设置中填写 API 地址");
  if(!aiCfg.apiKey)throw new Error("请先在设置 ⚙ 中填写 API Key");
  let userContent;
  if(imageBlocks.length){
    const parts=imageBlocks.map(img=>({type:"image",source:{type:"base64",media_type:img.mediaType,data:img.b64}}));
    parts.push({type:"text",text:`【以上${imageBlocks.length}张图为知识库参考（${imageBlocks.map((img,i)=>`图${i+1}：${img.label}`).join("、")}），请仔细分析后结合任务生成内容】\n\n${user}`});
    userContent=parts;
  }else{userContent=user;}
  let headers,body;
  if(prov.format==="anthropic"){
    headers={"Content-Type":"application/json","x-api-key":aiCfg.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    body=JSON.stringify({model,max_tokens:2000,system:fullSys,messages:[{role:"user",content:userContent}]});
  }else{
    headers={"Content-Type":"application/json","Authorization":`Bearer ${aiCfg.apiKey}`};
    body=JSON.stringify({model,max_tokens:2000,messages:[{role:"system",content:fullSys},{role:"user",content:userContent}]});
  }
  const res=await fetch(baseURL,{method:"POST",headers,body});
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error(`HTTP ${res.status}${t?": "+t.slice(0,160):""}`);}
  const data=await res.json();
  return prov.format==="anthropic"?(data.content?.map(c=>c.text||"").join("")||""):(data.choices?.[0]?.message?.content||"");
}

function robustParse(raw){if(!raw?.trim())return null;const s=raw.trim();try{return JSON.parse(s);}catch{}const st=s.replace(/^```(?:json)?\s*/i,"").replace(/\s*```$/,"").trim();try{return JSON.parse(st);}catch{}const a1=s.indexOf("["),a2=s.lastIndexOf("]");if(a1!==-1&&a2>a1)try{return JSON.parse(s.slice(a1,a2+1));}catch{}const o1=s.indexOf("{"),o2=s.lastIndexOf("}");if(o1!==-1&&o2>o1)try{return JSON.parse(s.slice(o1,o2+1));}catch{}return null;}

async function fetchPSD(gameplay,idea,kb,aiCfg){
  const sys=`你是资深手游买量广告的视觉设计总监，精通短视频广告的平面素材制作规范。

要求：图层结构10-15层，从底到顶排列，描述要具体（含色值、尺寸、混合模式等）；style字段：如有知识库图片/视频帧，请从中提炼视觉风格；notes字段：主配色（含色值）、字体方向、图层组织建议。
只输出JSON对象，直接以{开头}结尾，禁止markdown。
格式：{"name":"文件名.psd","size":"尺寸","style":"视觉风格","layers":["图层描述"],"notes":"配色/字体/制作要点"}`;
  const user=`玩法：${gameplay}\n标题：${idea.title}\n钩子：${idea.hook||""}\n概念：${idea.concept}\n标签：${(idea.tags||[]).join("、")}\n情绪：${idea.emotion}\n预期：${idea.effect||""}`;
  const raw=await callAI(sys,user,kb,aiCfg);const p=robustParse(raw);const item=(p&&!Array.isArray(p)&&p.name)?p:(Array.isArray(p)&&p.length?p[0]:null);
  if(item)return item;
  return{name:`${idea.title}_素材合集.psd`,size:"1080x1920",style:`以「${idea.emotion}」为核心情绪，高对比暗色风格`,layers:[`底层背景：深色渐变（#0d0d1a→#1a1a2e）`,`核心主体：${(idea.tags||[]).slice(0,2).join("、")} 居中偏下55-65%`,"玩法UI元素组","操作引导箭头/手势",`片头钩子大字：「${idea.hook||idea.title}」字号100+`,"情绪高潮色调蒙版","粒子/光效装饰层","品牌组：LOGO+图标+评分","CTA按钮：暖橙#f59e0b","全局调色层（置顶）"],notes:`主色：#0d0d1a + #f59e0b。字体：标题超粗无衬线，正文中等粗细。按背景/内容/文案/UI/品牌分组。`};
}

  const onDragStart=useCallback(e=>{isDrag.current=true;dragX.current=e.clientX;dragW.current=sidebarWidth;document.body.style.cursor="col-resize";document.body.style.userSelect="none";const mv=e=>{if(!isDrag.current)return;setSidebarWidth(Math.min(380,Math.max(140,dragW.current+e.clientX-dragX.current)));};const up=()=>{isDrag.current=false;document.body.style.cursor="";document.body.style.userSelect="";window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);},[sidebarWidth]);

  // ── 玩法 ──────────────────────────────────────────────────────────────────
  const addGP=()=>{const n=newGPInput.trim();if(!n)return;const id="g"+(gpId.current++);lsSet(LS_GP_ID,gpId.current);setGameplays(p=>[...p,{id,label:n}]);setNewGPInput("");};
  const deleteGP=id=>setGameplays(p=>{const nx=p.filter(g=>g.id!==id);if(nx.length&&!nx.find(g=>g.label===activeGP))setActiveGP(nx[0].label);return nx;});
  const renameGP=(id,draft)=>{const n=draft.trim();if(!n){setEditingGP(null);return;}setGameplays(p=>p.map(g=>{if(g.id===id){if(g.label===activeGP)setActiveGP(n);return{...g,label:n};}return g;}));setEditingGP(null);};
  // ── 标签 ──────────────────────────────────────────────────────────────────
  const toggleTag=(cat,id)=>setTags(p=>({...p,[cat]:p[cat].map(t=>t.id===id?{...t,active:!t.active}:t)}));
  const deleteTag=(cat,id)=>setTags(p=>({...p,[cat]:p[cat].filter(t=>t.id!==id)}));
  const addTag=cat=>{const v=(newTagInputs[cat]||"").trim();if(!v)return;const id=tagId.current++;lsSet(LS_TAG_ID,tagId.current);setTags(p=>({...p,[cat]:[...p[cat],{id,name:v,rating:"B",active:true}]}));setNewTagInputs(p=>({...p,[cat]:""}));};
  const updateTR=(cat,id,r)=>{setTags(p=>({...p,[cat]:p[cat].map(t=>t.id===id?{...t,rating:r}:t)}));setEditingTag(null);};
  const updateTN=(cat,id,n)=>{if(n.trim())setTags(p=>({...p,[cat]:p[cat].map(t=>t.id===id?{...t,name:n.trim()}:t)}));setEditingTag(null);};
  const renameCat=(old,nw)=>{const n=nw.trim();if(!n||n===old){setEditingCat(null);return;}setTags(p=>{const e=Object.entries(p),i=e.findIndex(([k])=>k===old);if(i===-1)return p;e[i]=[n,e[i][1]];return Object.fromEntries(e);});setEditingCat(null);};
  const deleteCat=cat=>setTags(p=>{const n={...p};delete n[cat];return n;});
  const addCat=()=>{const n=newCatInput.trim();if(!n||tags[n])return;setTags(p=>({...p,[n]:[]}));setNewCatInput("");};

  // ── 知识库 ────────────────────────────────────────────────────────────────
  const deleteKB=id=>{deleteKBItem(id);setKb(p=>{const next=p.filter(i=>i.id!==id);saveKBOrder(next);return next;});};
  const toggleKB=id=>{setKb(p=>{const next=p.map(i=>i.id===id?{...i,disabled:!i.disabled}:i);saveKBOrder(next);return next;});};

  const addTextKB=()=>{
    const name=txtName.trim(),content=txtContent.trim();
    if(!name||!content)return;
    const id=_kbId++;lsSet(LS_KB_CTR,_kbId);
    const item={id,type:txtType,name,content,size:`${content.length}字`};
    const ok=saveKBItem(item);
    if(!ok){setUploadMsg("⚠ 存储空间不足，文字已加入本次会话但无法持久化");setTimeout(()=>setUploadMsg(""),4000);}
    setKb(p=>{const next=[...p,item];saveKBOrder(next);return next;});
    setTxtName("");setTxtContent("");setKbTab("list");
  };

  const handleImages=async files=>{
    setUploading(true);setUploadMsg("");let added=0;
    for(const f of Array.from(files)){
      if(!f.type.startsWith("image/"))continue;
      if(f.size>4*1024*1024){setUploadMsg(`「${f.name}」超4MB，已跳过`);continue;}
      try{
        const data=await fileToBase64(f);
        const id=_kbId++;lsSet(LS_KB_CTR,_kbId);
        const item={id,type:"image",name:f.name,data,mediaType:f.type,preview:`data:${f.type};base64,${data}`,size:`${(f.size/1024).toFixed(0)}KB`};
        const ok=saveKBItem(item);
        if(!ok)setUploadMsg("⚠ 存储空间不足，图片已加入本次会话但无法持久化");
        setKb(p=>{const next=[...p,item];saveKBOrder(next);return next;});
        added++;
      }catch(e){setUploadMsg(`读取「${f.name}」失败`);}
    }
    setUploading(false);if(added)setKbTab("list");
  };

  const loadVideoPreview=async file=>{
    setUploading(true);setUploadMsg("正在解析视频，抽取关键帧...");setVidPreview(null);
    try{const frames=await extractVideoFrames(file,vidFrameCount);setVidPreview({name:file.name,frames,file});setUploadMsg("");}
    catch(e){setUploadMsg(`❌ ${e.message}`);}
    setUploading(false);
  };
  const reExtractFrames=async()=>{if(vidPreview?.file)await loadVideoPreview(vidPreview.file);};
  const confirmVideo=()=>{
    if(!vidPreview)return;
    const{name,frames}=vidPreview;
    const id=_kbId++;lsSet(LS_KB_CTR,_kbId);
    const item={id,type:"video",name,frames,size:`${frames.length}帧`,preview:frames[0]?.preview};
    const ok=saveKBItem(item);
    if(!ok)setUploadMsg("⚠ 存储空间不足，视频帧已加入本次会话但无法持久化");
    setKb(p=>{const next=[...p,item];saveKBOrder(next);return next;});
    setVidPreview(null);setKbTab("list");
  };

  const onDrop=async e=>{
    e.preventDefault();setDragover(false);
    const files=Array.from(e.dataTransfer.files);
    const vids=files.filter(f=>f.type.startsWith("video/"));
    const imgs=files.filter(f=>f.type.startsWith("image/"));
    const txts=files.filter(f=>f.type.startsWith("text/")||f.name.match(/\.(txt|md)$/i));
    if(vids.length){setKbTab("video");await loadVideoPreview(vids[0]);}
    else if(imgs.length){setKbTab("image");await handleImages(imgs);}
    else if(txts.length){const t=await fileToText(txts[0]).catch(()=>"");setTxtName(txts[0].name.replace(/\.[^.]+$/,""));setTxtContent(t.slice(0,8000));setKbTab("text");}
  };

  // ── 主功能 ────────────────────────────────────────────────────────────────
  const[topic,setTopic]=useState("");
  const[loadingIdeas,setLoadingIdeas]=useState(false);
  const[ideas,setIdeas]=useState([]);
  const[ideasErr,setIdeasErr]=useState("");
  const[selectedIdea,setSelectedIdea]=useState(null);
  const[psdData,setPsdData]=useState(null);
  const[sopData,setSopData]=useState(null);
  const[loadingPSD,setLoadingPSD]=useState(false);
  const[loadingSOP,setLoadingSOP]=useState(false);
  const[psdErr,setPsdErr]=useState("");
  const[sopErr,setSopErr]=useState("");
  const[activeTab,setActiveTab]=useState("psd");
  const activeTags=Object.entries(tags).flatMap(([cat,list])=>list.filter(t=>t.active).map(t=>`[${cat}]${t.name}(${t.rating})`));

  const generateIdeas=useCallback(async()=>{
    if(!topic.trim()){setIdeasErr("请输入内容方向");return;}
    setLoadingIdeas(true);setIdeas([]);setSelectedIdea(null);setPsdData(null);setSopData(null);setIdeasErr("");setPsdErr("");setSopErr("");
    const sys=`你是资深休闲手游买量素材策划师。生成【恰好5个】差异化素材创意，切入角度各不相同。只输出JSON数组，[ 开头 ] 结尾，禁止markdown。优先S级标签，其次A级。如有知识库参考，充分学习后让创意对齐参考内容。
格式：[{"title":"标题6-10字","hook":"钩子10-20字","concept":"核心描述40-80字","tags":["标签1","标签2"],"effect":"预期反应20-30字","emotion":"情绪词2-4字"}]`;
    const user=`玩法：${activeGP}\n方向：${topic}\n\n标签库（S>A>B>C）：\n${activeTags.join("\n")}`;
    try{const raw=await callAI(sys,user,activeKB,aiCfg);const parsed=robustParse(raw);const list=Array.isArray(parsed)?parsed:parsed?.ideas;if(list?.length)setIdeas(list);else setIdeasErr(`解析失败：${(raw||"").slice(0,80)}`);}
    catch(e){setIdeasErr(e.message);}
    setLoadingIdeas(false);
  },[topic,activeTags,activeGP,activeKB,aiCfg]);

  const selectIdea=useCallback(idea=>{
    setSelectedIdea(idea);setPsdData(null);setSopData(null);setPsdErr("");setSopErr("");setLoadingPSD(true);setLoadingSOP(true);setActiveTab("psd");
    fetchPSD(activeGP,idea,activeKB,aiCfg).then(d=>{setPsdData(d);setLoadingPSD(false);}).catch(e=>{setPsdErr(e.message);setLoadingPSD(false);});
    fetchSOP(activeGP,idea,activeKB,aiCfg).then(d=>{setSopData(d);setLoadingSOP(false);}).catch(e=>{setSopErr(e.message);setLoadingSOP(false);});
  },[activeGP,activeKB,aiCfg]);

  const retryPSD=()=>{if(!selectedIdea)return;setPsdData(null);setPsdErr("");setLoadingPSD(true);fetchPSD(activeGP,selectedIdea,activeKB,aiCfg).then(d=>{setPsdData(d);setLoadingPSD(false);}).catch(e=>{setPsdErr(e.message);setLoadingPSD(false);});};
  const retrySOP=()=>{if(!selectedIdea)return;setSopData(null);setSopErr("");setLoadingSOP(true);fetchSOP(activeGP,selectedIdea,activeKB,aiCfg).then(d=>{setSopData(d);setLoadingSOP(false);}).catch(e=>{setSopErr(e.message);setLoadingSOP(false);});};

  const typeIcon={text:"📄",script:"📝",image:"🖼️",video:"🎬"};
  const typeColor={text:"#60a5fa",script:"#a78bfa",image:"#34d399",video:"#fb923c"};
  const typeLabel={text:"文字",script:"脚本",image:"图片",video:"视频"};
  const prov=PROVIDERS[aiCfg.providerId]||PROVIDERS.anthropic;
  const apiReady=!!aiCfg.apiKey;

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#0f0f11",color:"#e2e0db",overflow:"hidden",fontFamily:"'PingFang SC','Microsoft YaHei',sans-serif"}}>
      <style>{STYLES}</style>

      {/* ══ HEADER ══ */}
      <div style={{padding:"9px 14px",borderBottom:"1px solid #1e1e22",display:"flex",alignItems:"center",gap:9,background:"#0a0a0c",flexShrink:0}}>
        <div style={{width:24,height:24,background:"linear-gradient(135deg,#f59e0b,#ef4444)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12}}>✦</div>
        <div><div style={{fontSize:12,fontWeight:600,color:"#fff"}}>素材发散工具</div><div style={{fontSize:9,color:"#6b6b75"}}>AI 驱动的视频创意引擎</div></div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:9,padding:"2px 7px",borderRadius:4,background:"#f59e0b18",color:"#f59e0b",border:"1px solid #f59e0b33"}}>{activeGP}</span>
          <span style={{fontSize:9,color:"#6b6b75"}}><b style={{color:"#f59e0b"}}>{activeTags.length}</b> 标签</span>
          <button onClick={()=>setShowKB(true)} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:5,border:`1px solid ${activeKB.length?"#a78bfa55":"#2a2a2e"}`,background:activeKB.length?"#a78bfa11":"#1a1a1e",color:activeKB.length?"#c4b5fd":"#6b6b75",fontSize:9,cursor:"pointer"}}>
            📚 知识库{activeKB.length>0&&<span style={{background:"#a78bfa",color:"#fff",borderRadius:"50%",width:14,height:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,flexShrink:0}}>{activeKB.length}</span>}
          </button>
          <button onClick={()=>{setSettingsTab("api");setShowSettings(true);}} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:5,border:`1px solid ${apiReady?"#10b98133":"#7f1d1d"}`,background:apiReady?"#10b98111":"#2a1212",color:apiReady?"#10b981":"#f87171",fontSize:9,cursor:"pointer",fontWeight:500}}>
            {apiReady?"✓":"⚠"} {apiReady?prov.label.split(" ")[0]:"未配置 Key"} <span style={{color:"#4b4b55",fontSize:8}}>| ⚙</span>
          </button>
        </div>
      </div>

      {/* ══ BODY ══ */}
      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>

        {/* 侧边栏 */}
        <div style={{width:sidebarWidth,padding:"9px 7px",overflowY:"auto",background:"#0a0a0c",flexShrink:0}}>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:8,color:"#6b6b75",letterSpacing:".08em",marginBottom:6}}>游戏玩法</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {gameplays.map(g=>editingGP?.id===g.id
                ?<div key={g.id} style={{display:"flex",gap:2,width:"100%",marginBottom:2}}>
                  <input value={editingGP.draft} onChange={e=>setEditingGP(p=>({...p,draft:e.target.value}))} onBlur={()=>renameGP(g.id,editingGP.draft)} onKeyDown={e=>{if(e.key==="Enter")renameGP(g.id,editingGP.draft);if(e.key==="Escape")setEditingGP(null);}} autoFocus style={{flex:1,background:"#1a1a1e",border:"1px solid #f59e0b55",borderRadius:3,padding:"2px 5px",color:"#e2e0db",fontSize:9,outline:"none"}}/>
                  <button onClick={()=>renameGP(g.id,editingGP.draft)} style={{background:"#14532d",border:"none",color:"#6ee7b7",borderRadius:2,fontSize:8,padding:"1px 5px",cursor:"pointer"}}>✓</button>
                  <button onClick={()=>setEditingGP(null)} style={{background:"none",border:"none",color:"#555",fontSize:8,cursor:"pointer"}}>✕</button>
                </div>
                :<div key={g.id} style={{display:"flex",alignItems:"center",gap:1}}>
                  <button onClick={()=>setActiveGP(g.label)} style={{padding:"3px 8px",borderRadius:5,border:`1px solid ${activeGP===g.label?"#f59e0b":"#2a2a2e"}`,background:activeGP===g.label?"#f59e0b18":"#1a1a1e",color:activeGP===g.label?"#f59e0b":"#6b6b75",fontSize:10,cursor:"pointer",fontWeight:activeGP===g.label?600:400}}>{g.label}</button>
                  <button onClick={()=>setEditingGP({id:g.id,draft:g.label})} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:7}}>✎</button>
                  <button onClick={()=>deleteGP(g.id)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:7}}>✕</button>
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:2,marginTop:5}}>
              <input value={newGPInput} onChange={e=>setNewGPInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addGP()} placeholder="+ 新增玩法" style={{flex:1,background:"transparent",border:"1px solid #1e1e22",borderRadius:3,padding:"2px 5px",color:"#9ca3af",fontSize:8,outline:"none"}}/>
              <button onClick={addGP} style={{background:"#1e1e22",border:"1px solid #2a2a2e",color:"#9ca3af",borderRadius:3,padding:"2px 6px",fontSize:8,cursor:"pointer"}}>+</button>
            </div>
          </div>

          <div style={{height:1,background:"#1e1e22",margin:"3px 0 9px"}}/>
          <div style={{fontSize:8,color:"#6b6b75",letterSpacing:".08em",marginBottom:6}}>标签库 / TAG BANK</div>
          <div style={{display:"flex",gap:2,flexWrap:"wrap",marginBottom:7}}>
            {Object.entries(RL).map(([r,l])=><span key={r} style={{fontSize:7,padding:"1px 3px",borderRadius:2,background:RC[r].bg+"44",color:RC[r].text,border:`1px solid ${RC[r].border}44`}}>{r}·{l}</span>)}
          </div>

          {Object.entries(tags).map(([cat,tagList])=>(
            <div key={cat} style={{marginBottom:10}}>
              {editingCat?.oldName===cat
                ?<div style={{display:"flex",gap:2,marginBottom:3}}>
                  <input value={editingCat.draftName} onChange={e=>setEditingCat(p=>({...p,draftName:e.target.value}))} onBlur={()=>renameCat(cat,editingCat.draftName)} onKeyDown={e=>{if(e.key==="Enter")renameCat(cat,editingCat.draftName);if(e.key==="Escape")setEditingCat(null);}} autoFocus style={{flex:1,background:"#1a1a1e",border:"1px solid #f59e0b55",borderRadius:3,padding:"1px 4px",color:"#e2e0db",fontSize:8,outline:"none"}}/>
                  <button onClick={()=>renameCat(cat,editingCat.draftName)} style={{background:"#14532d",border:"none",color:"#6ee7b7",borderRadius:2,fontSize:7,padding:"1px 4px",cursor:"pointer"}}>✓</button>
                  <button onClick={()=>setEditingCat(null)} style={{background:"none",border:"none",color:"#555",fontSize:7,cursor:"pointer"}}>✕</button>
                </div>
                :<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:8,color:"#9ca3af",fontWeight:500}}>{cat}</span>
                  <div style={{display:"flex",gap:1}}>
                    <button onClick={()=>setEditingCat({oldName:cat,draftName:cat})} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:7}}>✎</button>
                    <button onClick={()=>deleteCat(cat)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:7}}>✕</button>
                  </div>
                </div>
              }
              <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                {tagList.map(tag=>editingTag?.id===tag.id&&editingTag?.cat===cat
                  ?<div key={tag.id} style={{background:"#1a1a1e",border:"1px solid #333",borderRadius:4,padding:4,width:"100%",marginBottom:2}}>
                    <input defaultValue={tag.name} onBlur={e=>updateTN(cat,tag.id,e.target.value)} autoFocus style={{background:"transparent",border:"none",color:"#e2e0db",fontSize:9,width:"100%",outline:"none",marginBottom:3}}/>
                    <div style={{display:"flex",gap:1}}>{["S","A","B","C"].map(r=><button key={r} onMouseDown={e=>e.preventDefault()} onClick={()=>updateTR(cat,tag.id,r)} style={{flex:1,background:tag.rating===r?RC[r].bg:"transparent",color:tag.rating===r?RC[r].text:"#6b6b75",border:`1px solid ${tag.rating===r?RC[r].border:"#333"}`,borderRadius:2,fontSize:8,padding:"2px 0",cursor:"pointer"}}>{r}</button>)}</div>
                  </div>
                  :<div key={tag.id} className="tag-row">
                    <button onClick={()=>toggleTag(cat,tag.id)} style={{display:"flex",alignItems:"center",gap:3,padding:"3px 7px",borderRadius:4,border:`1px solid ${tag.active?RC[tag.rating].border:"#2a2a2e"}`,background:tag.active?RC[tag.rating].bg+"55":"#1a1a1e",color:tag.active?RC[tag.rating].text:"#4b4b55",fontSize:10,cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}}>
                      <span style={{fontSize:7,fontWeight:700,opacity:tag.active?1:.4,flexShrink:0}}>{tag.rating}</span>{tag.name}
                    </button>
                    <div className="tag-actions" style={{display:"none",position:"absolute",right:0,top:"50%",transform:"translateY(-50%) translateX(100%)",flexDirection:"row",gap:1,paddingLeft:2,zIndex:10}}>
                      <button onClick={e=>{e.stopPropagation();setEditingTag({id:tag.id,cat});}} style={{width:16,height:16,borderRadius:3,background:"#2a2a38",border:"1px solid #3a3a50",color:"#9ca3af",cursor:"pointer",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✎</button>
                      <button onClick={e=>{e.stopPropagation();deleteTag(cat,tag.id);}} style={{width:16,height:16,borderRadius:3,background:"#2a1414",border:"1px solid #4a2020",color:"#f87171",cursor:"pointer",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:2,width:"100%",marginTop:1}}>
                  <input value={newTagInputs[cat]||""} onChange={e=>setNewTagInputs(p=>({...p,[cat]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTag(cat)} placeholder="+ 新标签" style={{flex:1,background:"transparent",border:"1px solid #1e1e22",borderRadius:2,padding:"2px 4px",color:"#9ca3af",fontSize:8,outline:"none"}}/>
                  <button onClick={()=>addTag(cat)} style={{background:"#1e1e22",border:"none",color:"#9ca3af",borderRadius:2,padding:"2px 5px",fontSize:8,cursor:"pointer"}}>+</button>
                </div>
              </div>
            </div>
          ))}
          <div style={{paddingTop:7,borderTop:"1px solid #1e1e22"}}>
            <div style={{fontSize:8,color:"#6b6b75",marginBottom:3}}>新增分类</div>
            <div style={{display:"flex",gap:2}}>
              <input value={newCatInput} onChange={e=>setNewCatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat()} placeholder="输入分类名称..." style={{flex:1,background:"transparent",border:"1px solid #1e1e22",borderRadius:2,padding:"2px 5px",color:"#9ca3af",fontSize:8,outline:"none"}}/>
              <button onClick={addCat} style={{background:"#1e1e22",border:"1px solid #2a2a2e",color:"#9ca3af",borderRadius:2,padding:"2px 6px",fontSize:8,cursor:"pointer"}}>+</button>
            </div>
          </div>
        </div>

        {/* 拖拽调宽 */}
        <div onMouseDown={onDragStart} style={{width:4,flexShrink:0,cursor:"col-resize",background:"transparent",borderRight:"1px solid #1e1e22"}} onMouseEnter={e=>e.currentTarget.style.background="#f59e0b33"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}/>

        {/* ══ 主区域 ══ */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          <div style={{padding:"10px 12px",borderBottom:"1px solid #1e1e22",flexShrink:0}}>
            {activeKB.length>0&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 9px",borderRadius:5,background:"#a78bfa0d",border:"1px solid #a78bfa2a",marginBottom:7,fontSize:8,color:"#c4b5fd"}}>
              📚 知识库已激活：{activeKB.map(i=>`${typeIcon[i.type]}「${i.name}」`).join(" ")}<span style={{marginLeft:"auto",color:"#6b6b75"}}>AI 将参考以上内容</span>
            </div>}
            {!apiReady&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 9px",borderRadius:5,background:"#2a1212",border:"1px solid #7f1d1d33",marginBottom:7,fontSize:8,color:"#fca5a5"}}>

              {/* 图片 */}
              {kbTab==="image"&&<div>
                <div style={{background:"#1a1a2a",border:"1px solid #a78bfa22",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:9,color:"#9ca3af",lineHeight:1.7}}>
                  🖼️ 上传竞品广告截图、参考素材图，AI 直接看图学习视觉风格。<br/>
                  ⚠ 单张建议 &lt; 2MB（localStorage 5MB 总限制），支持 JPG / PNG / WEBP。
                </div>
                <div className="drop-zone" style={{padding:"32px 20px",marginBottom:14}} onDrop={async e=>{e.preventDefault();await handleImages(e.dataTransfer.files);}} onDragOver={e=>e.preventDefault()} onClick={()=>{const i=document.createElement("input");i.type="file";i.multiple=true;i.accept="image/*";i.onchange=async e=>await handleImages(e.target.files);i.click();}}>
                  {uploading?<div style={{fontSize:11,color:"#a78bfa"}}>⏳ 处理中...</div>:<><div style={{fontSize:32,marginBottom:8}}>🖼️</div><div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>拖拽图片到此，或点击选择</div><div style={{fontSize:9,color:"#4b4b55"}}>支持批量上传</div></>}
                </div>
                {kb.filter(i=>i.type==="image").length>0&&<div>
                  <div style={{fontSize:9,color:"#6b6b75",marginBottom:7}}>已上传图片</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>{kb.filter(i=>i.type==="image").map(it=><div key={it.id} style={{position:"relative"}}><img src={it.preview} alt={it.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:5,border:"1px solid #2a2a2e",display:"block"}}/><button onClick={()=>deleteKB(it.id)} style={{position:"absolute",top:2,right:2,width:14,height:14,borderRadius:"50%",background:"rgba(0,0,0,.7)",border:"none",color:"#fff",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",lineHeight:1}}>✕</button></div>)}</div>
                </div>}
                {uploadMsg&&<div style={{fontSize:9,color:"#f87171",marginTop:8}}>{uploadMsg}</div>}
              </div>}

              {/* 文字 */}
              {kbTab==="text"&&<div>
                <div style={{background:"#1a1a2a",border:"1px solid #a78bfa22",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:9,color:"#9ca3af",lineHeight:1.7}}>
                  ✏️ 粘贴竞品分析、爆款脚本、策划文档，AI 学习内容风格和策略框架。
                </div>
                <div style={{display:"flex",gap:5,marginBottom:10}}>
                  {[{id:"script",label:"📝 视频脚本"},{id:"text",label:"📄 文字参考"}].map(t=><button key={t.id} onClick={()=>setTxtType(t.id)} style={{flex:1,padding:"7px 8px",borderRadius:6,border:`1px solid ${txtType===t.id?"#a78bfa":"#2a2a2e"}`,background:txtType===t.id?"#a78bfa11":"#1a1a1e",color:txtType===t.id?"#c4b5fd":"#6b6b75",fontSize:9,cursor:"pointer",textAlign:"left",fontWeight:txtType===t.id?600:400}}>{t.label}</button>)}
                </div>
                <div style={{marginBottom:8}}><div style={{fontSize:9,color:"#6b6b75",marginBottom:4}}>参考名称</div><input value={txtName} onChange={e=>setTxtName(e.target.value)} placeholder='例如：「三消爆款30s脚本」' style={{width:"100%",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:6,padding:"8px 10px",color:"#e2e0db",fontSize:11,outline:"none"}}/></div>
                <div style={{marginBottom:12}}><div style={{fontSize:9,color:"#6b6b75",marginBottom:4}}>内容（最多 8000 字）</div><textarea value={txtContent} onChange={e=>setTxtContent(e.target.value.slice(0,8000))} placeholder="粘贴文案、脚本、分析内容..." rows={7} style={{width:"100%",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:6,padding:"8px 10px",color:"#e2e0db",fontSize:11,outline:"none",resize:"vertical",lineHeight:1.6}}/><div style={{fontSize:8,color:"#3a3a45",textAlign:"right",marginTop:2}}>{txtContent.length}/8000 字</div></div>
                <button onClick={addTextKB} disabled={!txtName.trim()||!txtContent.trim()} style={{width:"100%",padding:"10px",borderRadius:8,background:(!txtName.trim()||!txtContent.trim())?"#1e1e22":"linear-gradient(135deg,#a78bfa,#6366f1)",border:"none",color:(!txtName.trim()||!txtContent.trim())?"#4b4b55":"#fff",fontSize:11,fontWeight:600,cursor:(!txtName.trim()||!txtContent.trim())?"not-allowed":"pointer"}}>✓ 添加到知识库</button>
              </div>}
            </div>

            <div style={{padding:"10px 18px",borderTop:"1px solid #1e1e22",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{fontSize:8,color:"#3a3a45"}}>文字/图片/视频帧自动存入 localStorage · 刷新后恢复（受5MB限制）</div>
              <button onClick={()=>setShowKB(false)} style={{padding:"5px 16px",borderRadius:6,background:"linear-gradient(135deg,#a78bfa,#6366f1)",border:"none",color:"#fff",fontSize:10,fontWeight:600,cursor:"pointer"}}>完成</button>
            </div>
          </div>
        </div>
      )}

      {/* ══════════════ 设置弹窗 ══════════════ */}
      {showSettings&&(
        <div onClick={e=>e.target===e.currentTarget&&setShowSettings(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div style={{background:"#13131a",border:"1px solid #2a2a2e",borderRadius:14,width:460,maxWidth:"96vw",maxHeight:"92vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"15px 20px 0",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13}}>
                <div><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>⚙ 设置</div><div style={{fontSize:9,color:"#4b4b55",marginTop:2}}>配置信息自动保存，刷新后依然保留</div></div>
                <button onClick={()=>setShowSettings(false)} style={{background:"none",border:"none",color:"#6b6b75",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>
              </div>
              <div style={{display:"flex",borderBottom:"1px solid #1e1e22"}}>
                {[{id:"api",label:"🤖 AI 模型配置"},{id:"tags",label:"🏷️ 标签库管理"}].map(t=><button key={t.id} onClick={()=>setSettingsTab(t.id)} style={{flex:1,padding:"9px 4px",background:"transparent",border:"none",borderBottom:settingsTab===t.id?"2px solid #f59e0b":"2px solid transparent",color:settingsTab===t.id?"#f59e0b":"#6b6b75",fontSize:11,cursor:"pointer",fontWeight:settingsTab===t.id?600:400}}>{t.label}</button>)}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
              {settingsTab==="api"&&<div>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:7,background:apiReady?"#0d1f16":"#1f0d0d",border:`1px solid ${apiReady?"#10b98133":"#7f1d1d44"}`,marginBottom:14}}>
                  <span style={{fontSize:13}}>{apiReady?"✅":"⚠️"}</span>
                  <div><div style={{fontSize:10,fontWeight:600,color:apiReady?"#10b981":"#f87171"}}>{apiReady?"AI 已就绪，可以开始生成":"请选择厂商并填写 API Key"}</div><div style={{fontSize:8,color:"#4b4b55",marginTop:1}}>当前：{prov.label}{aiCfg.model&&aiCfg.providerId!=="custom"?` / ${aiCfg.model}`:""}{aiCfg.customModel?` / ${aiCfg.customModel}`:""}</div></div>
                  <span style={{marginLeft:"auto",fontSize:8,padding:"2px 7px",borderRadius:10,background:"#10b98115",color:"#10b981",border:"1px solid #10b98130",fontWeight:600,flexShrink:0}}>💾 自动保存</span>
                </div>
                <div style={{fontSize:10,color:"#6b6b75",marginBottom:8,fontWeight:500}}>选择 AI 厂商</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:16}}>
                  {Object.entries(PROVIDERS).map(([id,p])=><button key={id} onClick={()=>setAiCfg(c=>({...c,providerId:id,model:p.defaultModel}))} style={{padding:"9px 11px",borderRadius:8,border:`1px solid ${aiCfg.providerId===id?"#f59e0b":"#2a2a2e"}`,background:aiCfg.providerId===id?"#f59e0b0d":"#1a1a1e",color:aiCfg.providerId===id?"#f59e0b":"#9ca3af",fontSize:10,cursor:"pointer",textAlign:"left",fontWeight:aiCfg.providerId===id?600:400,lineHeight:1.5}}>{p.label}</button>)}
                </div>
                {aiCfg.providerId==="custom"&&<div style={{marginBottom:12}}><div style={{fontSize:10,color:"#6b6b75",marginBottom:5}}>API 地址（OpenAI 兼容）</div><input value={aiCfg.customBaseURL} onChange={e=>setAiCfg(c=>({...c,customBaseURL:e.target.value}))} placeholder="https://your-proxy.com/v1/chat/completions" style={{width:"100%",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:7,padding:"9px 11px",color:"#e2e0db",fontSize:11,outline:"none",fontFamily:"monospace"}}/></div>}
                {aiCfg.providerId==="custom"
                  ?<div style={{marginBottom:14}}><div style={{fontSize:10,color:"#6b6b75",marginBottom:5}}>模型名称</div><input value={aiCfg.customModel} onChange={e=>setAiCfg(c=>({...c,customModel:e.target.value}))} placeholder="gpt-4o / deepseek-chat / qwen-max" style={{width:"100%",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:7,padding:"9px 11px",color:"#e2e0db",fontSize:11,outline:"none",fontFamily:"monospace"}}/></div>
                  :prov.models.length>0&&<div style={{marginBottom:14}}><div style={{fontSize:10,color:"#6b6b75",marginBottom:6}}>模型选择</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{prov.models.map(m=><button key={m} onClick={()=>setAiCfg(c=>({...c,model:m}))} style={{padding:"5px 11px",borderRadius:6,border:`1px solid ${aiCfg.model===m?"#f59e0b":"#2a2a2e"}`,background:aiCfg.model===m?"#f59e0b0d":"#1a1a1e",color:aiCfg.model===m?"#f59e0b":"#6b6b75",fontSize:9,cursor:"pointer",fontWeight:aiCfg.model===m?600:400}}>{m}</button>)}</div></div>
                }
                <div style={{marginBottom:5,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{fontSize:10,color:"#6b6b75",fontWeight:500}}>API Key</div>{aiCfg.apiKey&&<span style={{fontSize:8,color:"#10b981"}}>✓ 已填写</span>}</div>
                <input type="password" value={aiCfg.apiKey} onChange={e=>setAiCfg(c=>({...c,apiKey:e.target.value}))} placeholder={prov.keyPlaceholder||"your-api-key"} style={{width:"100%",background:"#1a1a1e",border:`1px solid ${aiCfg.apiKey?"#10b98155":"#2a2a2e"}`,borderRadius:7,padding:"10px 11px",color:"#e2e0db",fontSize:12,outline:"none",fontFamily:"monospace"}}/>
                <div style={{fontSize:8,color:"#3a3a45",marginTop:6,lineHeight:1.6}}>Key 存储于浏览器 localStorage，<b style={{color:"#10b981"}}>刷新页面后依然保留</b>，不上传任何服务器。</div>
              </div>}
              {settingsTab==="tags"&&<div>
                <div style={{fontSize:9,color:"#6b6b75",marginBottom:10,lineHeight:1.6,background:"#1a1a1e",padding:"8px 11px",borderRadius:6}}>标签库数据保存在浏览器本地，可导出 JSON 文件备份，在新设备上导入恢复。</div>
                <button onClick={()=>exportConfig(tags,gameplays,tagId.current,gpId.current)} style={{width:"100%",padding:9,borderRadius:7,background:"#1a2a1a",border:"1px solid #10b98133",color:"#10b981",fontSize:10,cursor:"pointer",marginBottom:7,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>↓ 导出标签配置（JSON 文件）</button>
                <input ref={importInputRef} type="file" accept=".json" style={{display:"none"}} onChange={async e=>{const f=e.target.files?.[0];if(!f)return;e.target.value="";try{const cfg=await importConfig(f);setTags(cfg.tags);setGameplays(cfg.gameplays);if(cfg._tagIdNext){tagId.current=cfg._tagIdNext;lsSet(LS_TAG_ID,cfg._tagIdNext);}if(cfg._gpIdNext){gpId.current=cfg._gpIdNext;lsSet(LS_GP_ID,cfg._gpIdNext);}lsSet(LS_TAGS,cfg.tags);lsSet(LS_GAMEPLAYS,cfg.gameplays);setImportMsg("✓ 导入成功！");setTimeout(()=>setImportMsg(""),3000);}catch(err){setImportMsg("✕ 导入失败："+err.message);setTimeout(()=>setImportMsg(""),4000);}}}/>
                <button onClick={()=>importInputRef.current?.click()} style={{width:"100%",padding:9,borderRadius:7,background:"#1a1a2a",border:"1px solid #3b82f633",color:"#93c5fd",fontSize:10,cursor:"pointer",marginBottom:7,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>↑ 导入标签配置（从 JSON 恢复）</button>
                {importMsg&&<div style={{fontSize:9,padding:"5px 9px",borderRadius:5,background:importMsg.startsWith("✓")?"#14532d44":"#7f1d1d44",color:importMsg.startsWith("✓")?"#6ee7b7":"#fca5a5",marginBottom:7,textAlign:"center"}}>{importMsg}</div>}
                <div style={{height:1,background:"#1e1e22",margin:"12px 0"}}/>
                <button onClick={()=>{if(!window.confirm("确认重置所有标签和玩法为默认值？"))return;setTags(INITIAL_TAGS);setGameplays(INITIAL_GAMEPLAYS);lsSet(LS_TAGS,INITIAL_TAGS);lsSet(LS_GAMEPLAYS,INITIAL_GAMEPLAYS);lsSet(LS_TAG_ID,300);lsSet(LS_GP_ID,100);tagId.current=300;gpId.current=100;}} style={{width:"100%",padding:9,borderRadius:7,background:"transparent",border:"1px solid #2a2a2e",color:"#6b6b75",fontSize:10,cursor:"pointer"}}>↺ 重置为默认标签</button>
              </div>}
            </div>
            <div style={{padding:"11px 20px",borderTop:"1px solid #1e1e22",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <span style={{fontSize:8,color:"#3a3a45"}}>所有配置自动保存至 localStorage</span>
              <button onClick={()=>setShowSettings(false)} style={{padding:"6px 22px",borderRadius:7,background:"linear-gradient(135deg,#f59e0b,#ef4444)",border:"none",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>完成</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
